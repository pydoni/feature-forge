feature_views:
  - name: customer_txn_features
    entity: customer
    source: transactions
    features:
      - name: txn_count_7d
        dtype: int64
        description: "Number of transactions in last 7 days"
        aggregation: { function: count, column: amount, window: 7d }

      - name: txn_count_30d
        dtype: int64
        description: "Number of transactions in last 30 days"
        aggregation: { function: count, column: amount, window: 30d }

      - name: avg_amount_30d
        dtype: float64
        description: "Average transaction amount over 30 days"
        aggregation: { function: avg, column: amount, window: 30d }

      - name: max_amount_30d
        dtype: float64
        description: "Max transaction amount over 30 days"
        aggregation: { function: max, column: amount, window: 30d }

  - name: customer_profile_features
    entity: customer
    source: profiles
    features:
      - name: customer_age
        dtype: int32
        description: "Customer age"
        column: age
